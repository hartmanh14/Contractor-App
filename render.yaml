services:
  # Frontend — static Vite build. Rewrites unknown paths to /index.html for
  # client-side routing, and proxies /api/* to the backend web service below
  # so the production bundle can call the same relative URLs it uses in dev.
  - type: web
    name: buildboss
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://buildboss-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html

  # Backend — Node/Express API running the Anthropic-powered analysis
  # endpoints. Set ANTHROPIC_API_KEY (and optionally OPENAI_API_KEY) in the
  # Render dashboard; they are intentionally marked `sync: false` so they
  # are never committed to the repo.
  - type: web
    name: buildboss-api
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: node server/index.mjs
    healthCheckPath: /api/health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: NODE_VERSION
        value: 20
